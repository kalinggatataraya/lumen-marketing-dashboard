<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKAS — Marketing Command Center · PT Kalingga Tataraya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --ink:#0E1726; --ink-2:#1B2738; --ink-3:#2A3a52;
  --bg:#EEF1F6; --surface:#FFFFFF; --surface-2:#F6F8FB;
  --line:#E2E8F2; --line-2:#D6DEEC;
  --txt:#16202E; --txt-2:#5B6B82; --txt-3:#8A99B0;
  --primary:#0E9E6E; --primary-d:#0A7E58; --primary-soft:#E3F6EE;
  --seo:#5B61F0; --seo-soft:#ECEDFE;
  --social:#E84393; --social-soft:#FCE8F2;
  --market:#E8830C; --market-soft:#FDF0DD;
  --danger:#E5484D; --danger-soft:#FCEBEC;
  --warn:#D98A00; --ok:#0E9E6E;
  --r:14px; --r-sm:9px; --r-lg:20px;
  --sh:0 1px 2px rgba(14,23,38,.05),0 4px 16px rgba(14,23,38,.05);
  --sh-lg:0 10px 40px rgba(14,23,38,.13);
  --fast:.15s ease; --med:.28s cubic-bezier(.2,.7,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Sora',sans-serif;letter-spacing:-.02em;color:var(--txt)}
.tnum{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#C5D0E0;border-radius:10px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ LOGIN ============ */
#login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 80% 0%,#15324a 0%,var(--ink) 55%);padding:20px}
.login-card{width:100%;max-width:430px;background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-lg);overflow:hidden;animation:pop .4s var(--med)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.login-head{padding:30px 32px 22px;background:linear-gradient(110deg,var(--ink) 0%,var(--ink-2) 100%);color:#fff}
.login-head .logo{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.login-head .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#16C088);display:grid;place-items:center;font-family:'Sora';font-weight:800;color:#062c20;font-size:19px}
.login-head h1{color:#fff;font-size:22px;font-weight:800}
.login-head .sub{color:#9DB2C9;font-size:12.5px;margin-top:3px;letter-spacing:.04em}
.login-head p{color:#B9C8DA;font-size:13px;margin-top:14px}
.login-body{padding:22px 26px 28px}
.login-body .lbl{font-size:11.5px;font-weight:600;color:var(--txt-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:11px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.user-pick{display:flex;align-items:center;gap:11px;padding:12px;border:1.5px solid var(--line);border-radius:var(--r);background:var(--surface-2);transition:var(--fast);text-align:left}
.user-pick:hover{border-color:var(--primary);background:#fff;transform:translateY(-1px)}
.user-pick.sel{border-color:var(--primary);background:var(--primary-soft);box-shadow:0 0 0 3px var(--primary-soft)}
.user-pick .av{flex-shrink:0}
.user-pick .nm{font-weight:600;font-size:13px;line-height:1.2}
.user-pick .rl{font-size:11px;color:var(--txt-3);margin-top:1px}
.pin-row{display:flex;gap:10px}
.pin-row input{flex:1;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--r);letter-spacing:4px;font-weight:600;text-align:center}
.pin-row input:focus{outline:none;border-color:var(--primary)}
.btn-login{padding:12px 20px;background:var(--ink);color:#fff;border-radius:var(--r);font-weight:600;font-size:14px;transition:var(--fast)}
.btn-login:hover{background:var(--ink-2)}
.login-hint{font-size:11.5px;color:var(--txt-3);text-align:center;margin-top:14px}

/* ============ AVATAR ============ */
.av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;font-family:'Sora'}
.av.sm{width:24px;height:24px;font-size:10px}
.av.lg{width:42px;height:42px;font-size:15px}

/* ============ SHELL ============ */
#app{display:none}
.shell{display:flex;min-height:100vh}
.sidebar{width:236px;background:var(--ink);color:#C7D4E5;flex-shrink:0;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:40;transition:transform var(--med)}
.sb-brand{padding:18px 18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#16C088);display:grid;place-items:center;font-family:'Sora';font-weight:800;color:#062c20;font-size:17px}
.sb-brand .t1{font-family:'Sora';font-weight:800;color:#fff;font-size:16px;line-height:1}
.sb-brand .t2{font-size:10px;color:#7C8FA8;letter-spacing:.1em;margin-top:3px}
.sb-nav{flex:1;overflow-y:auto;padding:12px 12px 8px}
.sb-sec{font-size:10px;font-weight:700;color:#5E7290;text-transform:uppercase;letter-spacing:.09em;padding:14px 12px 7px}
.sb-link{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:#AFC0D6;font-weight:500;font-size:13.5px;transition:var(--fast);width:100%;text-align:left;position:relative}
.sb-link:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-link.active{background:var(--ink-3);color:#fff}
.sb-link.active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:3px;background:var(--lc,var(--primary))}
.sb-link .ic{width:18px;height:18px;flex-shrink:0;stroke-width:1.9}
.sb-link .badge{margin-left:auto;background:var(--lc,var(--primary));color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;min-width:18px;text-align:center}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px}
.sb-user .nm{font-size:13px;font-weight:600;color:#fff;line-height:1.1}
.sb-user .rl{font-size:11px;color:#8298B2}
.sb-user .out{margin-left:auto;color:#8298B2;padding:6px;border-radius:8px}
.sb-user .out:hover{background:rgba(255,255,255,.08);color:#fff}

.main{flex:1;margin-left:236px;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:rgba(238,241,246,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:13px 26px;display:flex;align-items:center;gap:16px}
.topbar .ham{display:none}
.topbar .crumb{font-family:'Sora';font-weight:700;font-size:17px}
.topbar .crumb small{display:block;font-family:'Inter';font-weight:400;font-size:11.5px;color:var(--txt-3);margin-top:1px}
.topbar .spacer{flex:1}
.topbar .tdate{font-size:12.5px;color:var(--txt-2);font-weight:500}
.sync-dot{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--txt-2);padding:5px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--line)}
.sync-dot i{width:7px;height:7px;border-radius:50%;background:#C5D0E0}
.sync-dot.on i{background:var(--primary)}
.content{padding:24px 26px 60px;max-width:1320px;width:100%}

/* ============ COMMON UI ============ */
.row{display:flex;gap:14px}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.pagehead .h{font-size:21px;font-weight:800}
.pagehead .d{color:var(--txt-2);font-size:13px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;font-weight:600;font-size:13px;transition:var(--fast);white-space:nowrap}
.btn .ic{width:16px;height:16px;stroke-width:2.1}
.btn.pri{background:var(--ink);color:#fff}
.btn.pri:hover{background:var(--ink-2)}
.btn.gho{background:var(--surface);color:var(--txt);border:1px solid var(--line-2)}
.btn.gho:hover{border-color:var(--ink-3);background:#fff}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.acc{background:var(--accent,var(--primary));color:#fff}
.btn.acc:hover{filter:brightness(.94)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.card-h{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-h h3{font-size:14.5px;font-weight:700}
.card-h .sub{font-size:12px;color:var(--txt-3);font-weight:400}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;line-height:1.4}
.pill .d{width:6px;height:6px;border-radius:50%}
.pill.todo{background:#EEF1F6;color:#64748B}
.pill.progress{background:#FFF4E0;color:#B47700}
.pill.review{background:var(--seo-soft);color:#4A4FCB}
.pill.done{background:var(--primary-soft);color:var(--primary-d)}
.pill.high{background:var(--danger-soft);color:#C13A3E}
.pill.med{background:#FFF4E0;color:#B47700}
.pill.low{background:#EEF1F6;color:#64748B}
.tag{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:7px;font-size:11px;font-weight:600;background:var(--surface-2);color:var(--txt-2);border:1px solid var(--line)}
.chl{padding:2px 8px;border-radius:7px;font-size:11px;font-weight:700;color:#fff}

.empty{text-align:center;padding:46px 20px;color:var(--txt-3)}
.empty svg{width:40px;height:40px;margin-bottom:12px;opacity:.5}
.empty .t{font-weight:600;color:var(--txt-2);font-size:14px}
.empty .s{font-size:12.5px;margin-top:4px}

/* KPI bento */
.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi .ic-w{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;margin-bottom:12px}
.kpi .ic-w svg{width:18px;height:18px;stroke-width:2}
.kpi .v{font-size:27px;font-weight:800;font-family:'Sora';line-height:1}
.kpi .l{font-size:12.5px;color:var(--txt-2);margin-top:5px;font-weight:500}
.kpi .sub{font-size:11.5px;margin-top:8px;font-weight:600}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 14px;font-size:11px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line);background:var(--surface-2)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface-2)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}

/* kanban */
.kanban{display:grid;gap:13px;align-items:start}
.kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);min-height:120px;transition:var(--fast)}
.kcol.drag-over{border-color:var(--primary);background:var(--primary-soft)}
.kcol-h{padding:11px 14px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:12.5px;position:sticky;top:60px}
.kcol-h .cnt{margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:20px;font-size:11px;padding:0 8px;color:var(--txt-2);min-width:22px;text-align:center}
.kcol-h .d{width:8px;height:8px;border-radius:50%}
.kbody{padding:0 10px 10px;display:flex;flex-direction:column;gap:9px;min-height:30px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px;box-shadow:0 1px 2px rgba(14,23,38,.04);cursor:grab;transition:var(--fast)}
.kcard:hover{box-shadow:var(--sh);border-color:var(--line-2)}
.kcard.dragging{opacity:.5}
.kcard .kt{font-weight:600;font-size:13px;line-height:1.35;margin-bottom:7px}
.kcard .kmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:9px}
.kcard .kd{font-size:11px;color:var(--txt-3);display:flex;align-items:center;gap:4px}
.kcard .kd.over{color:var(--danger);font-weight:600}
.kbar{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.kbar button{font-size:11px;color:var(--txt-2);padding:3px 8px;border-radius:7px;background:var(--surface-2);font-weight:600}
.kbar button:hover{background:var(--ink);color:#fff}

/* pipeline */
.pipe{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.pcol{min-width:228px;flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r)}
.pcol-h{padding:11px 13px;font-weight:700;font-size:12px;display:flex;align-items:center;gap:7px;border-bottom:2px solid var(--stage,var(--social))}
.pcol-h .cnt{margin-left:auto;font-size:11px;color:var(--txt-2);background:#fff;border:1px solid var(--line);border-radius:20px;padding:0 7px}
.pbody{padding:10px;display:flex;flex-direction:column;gap:9px;min-height:40px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;box-shadow:0 1px 2px rgba(14,23,38,.04)}
.pcard .pt{font-weight:600;font-size:13px;line-height:1.3;margin-bottom:7px}
.pcard .chl-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.pcard .pmeta{font-size:11px;color:var(--txt-3);display:flex;align-items:center;gap:5px;margin-top:3px}
.pcard .pnav{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.pcard .pnav button{flex:1;font-size:11px;font-weight:600;padding:5px;border-radius:7px;background:var(--surface-2);color:var(--txt-2)}
.pcard .pnav button:hover{background:var(--social);color:#fff}
.pcard .pnav button.appr{background:var(--primary);color:#fff}
.pcard .pnav button.appr:hover{background:var(--primary-d)}

/* calendar */
.cal{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.cal-h{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
.cal-h .mo{font-family:'Sora';font-weight:700;font-size:16px}
.cal-h button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;color:var(--txt-2)}
.cal-h button:hover{background:var(--surface-2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--txt-3);padding:9px 0;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line)}
.cal-cell{min-height:96px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.muted{background:var(--surface-2)}
.cal-cell .dn{font-size:12px;font-weight:600;color:var(--txt-2)}
.cal-cell.today .dn{background:var(--ink);color:#fff;width:22px;height:22px;border-radius:50%;display:grid;place-items:center}
.cal-ev{font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:6px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px}
.cal-ev .d{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* segmented */
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--txt-2)}
.seg button.on{background:#fff;color:var(--txt);box-shadow:var(--sh)}

/* progress */
.bar{height:7px;border-radius:20px;background:var(--line);overflow:hidden}
.bar i{display:block;height:100%;border-radius:20px;background:var(--accent,var(--primary));transition:width .5s var(--med)}

/* modal */
.modal-bg{position:fixed;inset:0;z-index:90;background:rgba(14,23,38,.5);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:520px;background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-lg);animation:pop .3s var(--med)}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:16px;font-weight:700}
.modal-h .x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--txt-3)}
.modal-h .x:hover{background:var(--surface-2);color:var(--txt)}
.modal-b{padding:20px 22px}
.modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--txt-2);margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface-2);transition:var(--fast)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);background:#fff}
.fg textarea{resize:vertical;min-height:64px}
.fg .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chk-grid{display:flex;flex-wrap:wrap;gap:7px}
.chk{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--surface-2);transition:var(--fast)}
.chk.on{border-color:var(--primary);background:var(--primary-soft);color:var(--primary-d)}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:120;background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--sh-lg);opacity:0;pointer-events:none;transition:var(--med);display:flex;align-items:center;gap:9px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .ic{width:18px;height:18px;color:var(--primary)}

/* responsive */
.scrim{display:none;position:fixed;inset:0;background:rgba(14,23,38,.4);z-index:39}
@media(max-width:980px){
  .bento{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr!important}
}
@media(max-width:760px){
  .sidebar{transform:translateX(-100%);box-shadow:var(--sh-lg)}
  .sidebar.open{transform:none}
  .scrim.open{display:block}
  .main{margin-left:0}
  .topbar{padding:11px 16px}
  .topbar .ham{display:grid;place-items:center;width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--txt)}
  .topbar .tdate{display:none}
  .content{padding:18px 14px 60px}
  .bento{grid-template-columns:1fr 1fr;gap:10px}
  .kpi .v{font-size:23px}
  .user-grid{grid-template-columns:1fr}
  .cal-cell{min-height:64px}
  .cal-ev{font-size:9px}
  .pagehead .h{font-size:18px}
}
.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.hide{display:none!important}
.mb16{margin-bottom:16px}
.mut{color:var(--txt-3)}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="login-head">
      <div class="logo">
        <div class="mark">M</div>
        <div><h1>MARKAS</h1><div class="sub">MARKETING COMMAND CENTER</div></div>
      </div>
      <p>Satu tempat untuk SEO, sosial media, dan marketplace PT Kalingga Tataraya.</p>
    </div>
    <div class="login-body">
      <div class="lbl">Masuk sebagai</div>
      <div class="user-grid" id="loginUsers"></div>
      <div class="lbl">PIN</div>
      <div class="pin-row">
        <input id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••">

/* ---------- PERSISTENCE ---------- */
function save(){
  try{localStorage.setItem(K,JSON.stringify(S))}catch(e){}
  if(S.settings.sync) pushCloud();
}
function load(){
  try{const r=localStorage.getItem(K); if(r){S=JSON.parse(r); return true}}catch(e){}
  return false;
}
async function pullCloud(){
  const {supabaseUrl,supabaseKey,workspaceId}=S.settings;
  if(!supabaseUrl||!supabaseKey)return;
  try{
    const r=await fetch(`${supabaseUrl}/rest/v1/markas_state?id=eq.${encodeURIComponent(workspaceId)}&select=data`,{headers:{apikey:supabaseKey,Authorization:'Bearer '+supabaseKey}});
    if(r.ok){const rows=await r.json(); if(rows&&rows[0]&&rows[0].data&&rows[0].data.users){const cloud=rows[0].data; cloud.settings={...cloud.settings,supabaseUrl,supabaseKey,workspaceId,sync:true}; S=cloud; try{localStorage.setItem(K,JSON.stringify(S))}catch(e){} setSync(true);}}
  }catch(e){setSync(false)}
}
let pushT;
async function pushCloud(){
  clearTimeout(pushT);
  pushT=setTimeout(async()=>{
    const {supabaseUrl,supabaseKey,workspaceId}=S.settings;
    if(!supabaseUrl||!supabaseKey)return;
    try{
      const r=await fetch(`${supabaseUrl}/rest/v1/markas_state?on_conflict=id`,{method:'POST',headers:{apikey:supabaseKey,Authorization:'Bearer '+supabaseKey,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({id:workspaceId,data:S,updated_at:new Date().toISOString()})});
      setSync(r.ok);
    }catch(e){setSync(false)}
  },900);
}
function setSync(ok){
  const el=document.getElementById('syncDot');
  if(S.settings.sync){el.classList.add('on');el.querySelector('span').textContent=ok?'Tersinkron':'Sync gagal';}
  else{el.classList.remove('on');el.querySelector('span').textContent='Lokal';}
}

function buildNav(){
  const n=document.getElementById('nav');

  NAV.forEach(item=>{
    if(item.sec){h+=`<div class="sb-sec">${item.sec}</div>`;return}

    let badge='';
    if(item.id==='tasks'){const c=myOpenTasks().length; if(c)badge=`<span class="badge" style="--lc:${item.color}">${c}</span>`}
    if(item.id==='social'&&cur.role==='lead'){const c=S.content.filter(x=>x.stage==='review').length; if(c)badge=`<span class="badge" style="--lc:${item.color}">${c}</span>`}

  });
  n.innerHTML=h;
}

  h+=kpi('--primary','--primary-soft',I.task,myTasks.length,isLead?'Tugas tim aktif':'Tugas saya',S.tasks.filter(t=>t.status==='done').length+' selesai total');

  if(isLead||cur.role==='marketplace'){const t=mpTotals();

    h+=kpi('--seo','--seo-soft',I.seo,open,'Tugas SEO aktif',`<span style="color:var(--danger)">${overdue.length} lewat tenggat</span>`);}

    // second row lead
  }
  h+=`</div>`;

  // === LEAD: approval queue + team workload ===
  if(isLead){
    h+=`<div class="grid2 mb16">`;

    const pend=S.content.filter(c=>c.stage==='review');

    else pend.forEach(c=>{h+=`<div style="display:flex;align-items:center;gap:11px;padding:11px 10px;border-bottom:1px solid var(--line)">

      <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">${esc(c.title)}</div>

      <button class="btn acc sm" style="--accent:var(--primary)" onclick="approveContent('${c.id}')">Setujui</button>
      <button class="btn gho sm" onclick="openContent('${c.id}')">Lihat</button></div>`});
    h+=`</div></div>`;
    // team workload
    h+=`<div class="card"><div class="card-h"><h3>Beban kerja tim</h3></div><div style="padding:14px 16px">`;
    S.users.filter(u=>u.role!=='lead').forEach(u=>{
      const open=S.tasks.filter(t=>t.assignee===u.id&&t.status!=='done').length;
      const ov=S.tasks.filter(t=>t.assignee===u.id&&isOverdue(t.due,t.status)).length;
      const pct=Math.min(100,open*20);
      h+=`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">
        ${avatar(u.id,'sm')}<span style="font-weight:600;font-size:12.5px">${esc(ROLES[u.role].short)}</span>
        <span style="margin-left:auto;font-size:12px;color:var(--txt-2)">${open} tugas${ov?` · <span style="color:var(--danger);font-weight:600">${ov} lewat</span>`:''}</span></div>
        <div class="bar"><i style="width:${pct}%;--accent:${u.color}"></i></div></div>`;
    });
    h+=`</div></div></div>`;
  }

  // === Tugas saya / hari ini ===
  const due=S.tasks.filter(t=>t.status!=='done'&&(isLead||t.assignee===cur.id)).sort((a,b)=>(a.due||'9')<(b.due||'9')?-1:1).slice(0,6);
  h+=`<div class="card mb16"><div class="card-h"><h3>${isLead?'Tugas tim terdekat':'Tugas saya'}</h3><button class="btn gho sm" onclick="go('tasks')">Buka papan</button></div>`;
  if(!due.length)h+=emptyBox(I.check,'Mantap, tidak ada tugas tertunda','Semua sudah beres.');
  else{h+=`<div style="padding:6px 4px">`;
    due.forEach(t=>{const ov=isOverdue(t.due,t.status);
      h+=`<div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-bottom:1px solid var(--line)">

    h+=`</div>`;}
  h+=`</div>`;

  // quick links
  h+=`<div class="card"><div class="card-h"><h3>Akses cepat</h3></div><div style="padding:16px;display:flex;gap:10px;flex-wrap:wrap">`;
  h+=quick(I.seo,'SEO Monitor','Pantau ranking',`window.open('${S.settings.seoMonitorUrl}','_blank')`,'--seo');
  if(isLead||cur.role==='social')h+=quick(I.social,'Buat konten','Tambah ke pipeline',`go('social');setTimeout(()=>openContent('new'),100)`,'--social');
  if(isLead||cur.role==='marketplace')h+=quick(I.box,'Input harian','Lapor marketplace',`go('market');setTimeout(()=>openMpDaily('new'),100)`,'--market');
  h+=quick(I.cal,'Kalender','Lihat jadwal',`go('calendar')`,'--primary');
  h+=`</div></div>`;
  V.innerHTML=h;
}
function kpi(c,soft,ic,v,l,sub){return `<div class="kpi"><div class="ic-w" style="background:var(${soft});color:var(${c})">${svg(ic)}</div><div class="v tnum">${v}</div><div class="l">${l}</div><div class="sub mut">${sub}</div></div>`}
function quick(ic,t,s,act,c){return `<button class="btn gho" style="flex-direction:column;align-items:flex-start;padding:14px;min-width:150px;gap:8px" onclick="${act}"><span style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(${c.replace(')','-soft)').replace('--','--')||''};color:var(${c})">${svg(ic)}</span><span style="text-align:left"><span style="font-weight:700;font-size:13px;display:block">${t}</span><span style="font-size:11.5px;color:var(--txt-3);font-weight:400">${s}</span></span></button>`}
function emptyBox(ic,t,s){return `<div class="empty">${svg(ic).replace('class="ic ','class="')}<div class="t">${t}</div><div class="s">${s}</div></div>`}
function roleTag(r){const c={lead:'--primary',seo:'--seo',social:'--social',marketplace:'--market'}[r];return `<span style="color:var(${c});font-weight:600">${ROLES[r].short}</span>`}
function platformPills(arr){return (arr||[]).map(p=>`<span class="chl" style="background:${PLATFORMS[p]?PLATFORMS[p][1]:'#888'}">${PLATFORMS[p]?PLATFORMS[p][0]:p}</span>`).join(' ')}

/* ============================================================
   TASKS (Kanban)
   ============================================================ */
let taskFilter='all';
function vTasks(V){
  const isLead=cur.role==='lead';
  let h=`<div class="pagehead"><div><div class="h">Papan Tugas</div><div class="d">Geser kartu antar kolom atau pakai tombol untuk pindah status.</div></div>
    <button class="btn pri" onclick="openTask('new')">${svg(I.plus)} Tugas baru</button></div>`;
  // filter
  h+=`<div class="seg mb16">`;
  h+=`<button class="${taskFilter==='all'?'on':''}" onclick="taskFilter='all';render()">Semua</button>`;
  h+=`<button class="${taskFilter==='mine'?'on':''}" onclick="taskFilter='mine';render()">Tugas saya</button>`;
  ['seo','social','marketplace'].forEach(r=>{if(isLead)h+=`<button class="${taskFilter===r?'on':''}" onclick="taskFilter='${r}';render()">${ROLES[r].short}</button>`});
  h+=`</div>`;

  let list=S.tasks.slice();
  if(taskFilter==='mine')list=list.filter(t=>t.assignee===cur.id);
  else if(taskFilter!=='all')list=list.filter(t=>t.role===taskFilter);
  else if(!isLead)list=list.filter(t=>t.assignee===cur.id||t.role===cur.role);

  h+=`<div class="kanban" style="grid-template-columns:repeat(4,1fr)">`;
  TASK_COLS.forEach(([st,label,col])=>{
    const items=list.filter(t=>t.status===st);
    h+=`<div class="kcol" data-status="${st}" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropTask(event,'${st}')">
      <div class="kcol-h"><span class="d" style="background:${col}"></span>${label}<span class="cnt">${items.length}</span></div>
      <div class="kbody">`;
    items.forEach(t=>{const ov=isOverdue(t.due,t.status);
      const idx=TASK_COLS.findIndex(c=>c[0]===st);
      h+=`<div class="kcard" draggable="true" ondragstart="dragStart(event,'${t.id}')" ondragend="dragEnd(event)" onclick="openTask('${t.id}')">
        <div class="kt">${esc(t.title)}</div>
        <div class="kmeta">${avatar(t.assignee,'sm')}${roleChip(t.role)}<span class="pill ${t.priority}" style="margin-left:auto">${({high:'!',med:'•',low:'–'})[t.priority]}</span></div>
        ${t.due?`<div class="kd ${ov?'over':''}" style="margin-top:8px">${svg(I.clock).replace('class="ic ','class="').replace('<svg','<svg width=12 height=12')}${ov?'Lewat ':''}${fmtD(t.due)}</div>`:''}
        <div class="kbar" onclick="event.stopPropagation()">
          ${idx>0?`<button onclick="moveTask('${t.id}',-1)">←</button>`:''}
          ${idx<3?`<button onclick="moveTask('${t.id}',1)" style="margin-left:auto">→</button>`:''}
        </div></div>`});
    if(!items.length)h+=`<div style="font-size:12px;color:var(--txt-3);text-align:center;padding:14px 0">—</div>`;
    h+=`</div></div>`;
  });
  h+=`</div>`;
  V.innerHTML=h;
}
function roleChip(r){const c={lead:'--primary',seo:'--seo',social:'--social',marketplace:'--market'}[r];return `<span class="tag" style="color:var(${c});border-color:transparent;background:color-mix(in srgb,var(${c}) 12%,#fff)">${ROLES[r].short}</span>`}
let dragId=null;
function dragStart(e,id){dragId=id;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function dragEnd(e){e.target.classList.remove('dragging')}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function dragLeave(e){e.currentTarget.classList.remove('drag-over')}
function dropTask(e,st){e.preventDefault();e.currentTarget.classList.remove('drag-over');const t=S.tasks.find(x=>x.id===dragId);if(t&&t.status!==st){t.status=st;save();render();toast('Status diperbarui')}}
function moveTask(id,dir){const t=S.tasks.find(x=>x.id===id);const i=TASK_COLS.findIndex(c=>c[0]===t.status);const ni=i+dir;if(ni<0||ni>3)return;t.status=TASK_COLS[ni][0];save();render()}

function vSocial(V){
  const isLead=cur.role==='lead';
  let h=`<div class="pagehead"><div><div class="h">Pipeline Konten Sosial Media</div><div class="d">Alur: Ide → Brief → Shooting → Editing → Review → Terjadwal → Tayang. Review butuh persetujuan Lead.</div></div>
    <button class="btn acc" style="--accent:var(--social)" onclick="openContent('new')">${svg(I.plus)} Konten baru</button></div>`;

  // mini stats
  const posted=S.content.filter(c=>c.stage==='posted');
  const reach=posted.reduce((a,c)=>a+(c.metrics.reach||0),0);
  h+=`<div class="bento mb16" style="grid-template-columns:repeat(4,1fr)">`;
  h+=kpi('--social','--social-soft',I.social,S.content.filter(c=>c.stage!=='posted').length,'Dalam pipeline','');
  h+=kpi('--seo','--seo-soft',I.eye,posted.length,'Sudah tayang','');
  h+=kpi('--primary','--primary-soft',I.star,reach.toLocaleString('id-ID'),'Total reach','konten tayang');
  h+=kpi('--market','--market-soft',I.alert,S.content.filter(c=>c.stage==='review').length,'Menunggu approval','');
  h+=`</div>`;

  h+=`<div class="pipe">`;
  STAGES.forEach(([st,label])=>{
    const items=S.content.filter(c=>c.stage===st);
    h+=`<div class="pcol"><div class="pcol-h" style="--stage:var(--social)">${label}<span class="cnt">${items.length}</span></div><div class="pbody">`;
    items.forEach(c=>{
      const i=STAGES.findIndex(s=>s[0]===st);
      h+=`<div class="pcard" onclick="openContent('${c.id}')">
        <div class="pt">${esc(c.title)}</div>
        <div class="chl-row">${platformPills(c.platforms)}<span class="tag">${esc(c.type)}</span></div>
        <div class="pmeta">${avatar(c.owner,'sm')}<span>${c.postDate?'Tayang '+fmtD(c.postDate):'belum dijadwalkan'}</span></div>
        <div class="pnav" onclick="event.stopPropagation()">`;
      if(i>0)h+=`<button onclick="moveContent('${c.id}',-1)">←</button>`;
      if(st==='review'){
        if(isLead)h+=`<button class="appr" onclick="approveContent('${c.id}')">Setujui →</button>`;
        else h+=`<button disabled style="opacity:.5;cursor:default">Tunggu Lead</button>`;
      }else if(i<STAGES.length-1){h+=`<button onclick="moveContent('${c.id}',1)">→</button>`}
      h+=`</div></div>`;
    });
    if(!items.length)h+=`<div style="font-size:11.5px;color:var(--txt-3);text-align:center;padding:10px 0">kosong</div>`;
    h+=`</div></div>`;
  });
  h+=`</div>`;
  V.innerHTML=h;
}
function moveContent(id,dir){const c=S.content.find(x=>x.id===id);const i=STAGES.findIndex(s=>s[0]===c.stage);const ni=i+dir;if(ni<0||ni>=STAGES.length)return;
  // gate: can't pass review unless lead
  if(STAGES[ni][0]==='scheduled'&&c.stage==='review'&&cur.role!=='lead'){toast('Hanya Lead yang bisa menyetujui');return}
  c.stage=STAGES[ni][0];save();render()}
function approveContent(id){if(cur.role!=='lead'){toast('Hanya Lead yang bisa menyetujui');return}const c=S.content.find(x=>x.id===id);c.stage='scheduled';save();render();toast('Konten disetujui & dijadwalkan')}

function slaEval(min){
  const tgt=S.settings.slaTargetMin||15, plat=S.settings.slaPlatformMin||60;
  if(min==null||isNaN(min))return{color:'var(--txt-3)',label:'—'};
  if(min<=tgt)return{color:'var(--ok)',label:`Target ≤${tgt}' tercapai`};
  if(min<=plat)return{color:'var(--warn)',label:`Aman (<${plat}') — kejar ≤${tgt}'`};
  return{color:'var(--danger)',label:`Lewat batas ideal ${plat}'`};
}

/* ============================================================
   CALENDAR
   ============================================================ */
function vCalendar(V){
  if(!calMonth){const d=new Date();calMonth=[d.getFullYear(),d.getMonth()]}
  const [y,m]=calMonth;
  const first=new Date(y,m,1),start=first.getDay(),days=new Date(y,m+1,0).getDate();
  const moName=first.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  // gather events
  const ev={};
  const add=(iso,label,color)=>{if(!iso)return;(ev[iso]=ev[iso]||[]).push({label,color})};
  S.content.forEach(c=>add(c.postDate,c.title,'var(--social)'));
  S.tasks.filter(t=>t.status!=='done').forEach(t=>add(t.due,t.title,{lead:'var(--primary)',seo:'var(--seo)',social:'var(--social)',marketplace:'var(--market)'}[t.role]));
  S.seo.filter(s=>s.status!=='done').forEach(s=>add(s.due,'SEO: '+s.title,'var(--seo)'));

  let h=`<div class="pagehead"><div><div class="h">Kalender Konten</div><div class="d">Jadwal tayang konten, deadline tugas & SEO dalam satu tampilan.</div></div>
    <div class="row" style="font-size:12px;align-items:center;gap:14px">${legend('var(--social)','Konten')}${legend('var(--seo)','SEO')}${legend('var(--primary)','Tugas')}${legend('var(--market)','Marketplace')}</div></div>`;
  h+=`<div class="cal"><div class="cal-h">
    <button onclick="calNav(-1)">‹</button><div class="mo">${moName}</div><button onclick="calNav(1)">›</button>
    <button onclick="calToday()" style="width:auto;padding:0 12px;font-size:12px;margin-left:8px">Hari ini</button></div>`;
  h+=`<div class="cal-grid">`;
  ['Min','Sen','Sel','Rab','Kam','Jum','Sab'].forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<start;i++)h+=`<div class="cal-cell muted"></div>`;
  for(let d=1;d<=days;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=iso===todayISO();
    h+=`<div class="cal-cell ${isToday?'today':''}"><div class="dn">${d}</div>`;
    (ev[iso]||[]).slice(0,3).forEach(e=>h+=`<div class="cal-ev" style="background:color-mix(in srgb,${e.color} 13%,#fff);color:${e.color}"><span class="d" style="background:${e.color}"></span>${esc(e.label)}</div>`);
    if((ev[iso]||[]).length>3)h+=`<div style="font-size:10px;color:var(--txt-3);margin-top:3px;padding-left:4px">+${ev[iso].length-3} lagi</div>`;
    h+=`</div>`;
  }
  h+=`</div></div>`;
  V.innerHTML=h;
}
function legend(c,l){return `<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:${c}"></span>${l}</span>`}
function calNav(d){let[y,m]=calMonth;m+=d;if(m<0){m=11;y--}if(m>11){m=0;y++}calMonth=[y,m];render()}
function calToday(){const d=new Date();calMonth=[d.getFullYear(),d.getMonth()];render()}

async function pullNow(){if(!S.settings.supabaseUrl){toast('Isi kredensial Supabase dulu');return}await pullCloud();toast('Data terbaru ditarik');render()}
function exportData(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='markas-kalingga-'+todayISO()+'.json';a.click();toast('Data diekspor')}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{S=JSON.parse(r.result);save();toast('Data diimpor');render()}catch{toast('File tidak valid')}};r.readAsText(f)}
function resetData(){if(confirm('Reset semua data ke contoh awal? Tindakan ini tidak bisa dibatalkan.')){S=seed();save();toast('Data direset');boot()}}
const val=id=>document.getElementById(id).value;

/* ============================================================
   MODALS
   ============================================================ */
function modal(title,body,footer){
  closeModal();
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalBg';
  bg.onclick=e=>{if(e.target===bg)closeModal()};
  bg.innerHTML=`<div class="modal"><div class="modal-h"><h3>${title}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">${body}</div><div class="modal-f">${footer}</div></div>`;
  document.body.appendChild(bg);
}
function closeModal(){const m=document.getElementById('modalBg');if(m)m.remove()}

/* --- Task modal --- */
function openTask(id){
  const t=id==='new'?{id:'new',title:'',role:cur.role==='lead'?'social':cur.role,assignee:cur.id,status:'todo',priority:'med',due:dISO(2),note:''}:S.tasks.find(x=>x.id===id);
  const staffOpts=S.users.map(u=>`<option value="${u.id}" ${u.id===t.assignee?'selected':''}>${esc(ROLES[u.role].short)}</option>`).join('');
  const body=`
    <div class="fg"><label>Judul tugas</label><input id="tTitle" value="${esc(t.title)}" placeholder="cth: Edit reels produk Kärcher"></div>
    <div class="fg two">
      <div><label>Divisi</label><select id="tRole">${Object.keys(ROLES).map(r=>`<option value="${r}" ${r===t.role?'selected':''}>${ROLES[r].short}</option>`).join('')}</select></div>
      <div><label>Ditugaskan ke</label><select id="tAssignee">${staffOpts}</select></div></div>
    <div class="fg two">
      <div><label>Prioritas</label><select id="tPriority">${['high','med','low'].map(p=>`<option value="${p}" ${p===t.priority?'selected':''}>${({high:'Tinggi',med:'Sedang',low:'Rendah'})[p]}</option>`).join('')}</select></div>
      <div><label>Tenggat</label><input type="date" id="tDue" value="${t.due||''}"></div></div>
    <div class="fg"><label>Catatan</label><textarea id="tNote" placeholder="Detail / brief singkat">${esc(t.note)}</textarea></div>`;
  const foot=`${id!=='new'?`<button class="btn gho" style="margin-right:auto;color:var(--danger)" onclick="delTask('${id}')">Hapus</button>`:''}
    <button class="btn gho" onclick="closeModal()">Batal</button><button class="btn pri" onclick="saveTask('${id}')">Simpan</button>`;
  modal(id==='new'?'Tugas baru':'Edit tugas',body,foot);
}
function saveTask(id){
  const o={title:val('tTitle'),role:val('tRole'),assignee:val('tAssignee'),priority:val('tPriority'),due:val('tDue'),note:val('tNote')};
  if(!o.title){toast('Judul wajib diisi');return}
  if(id==='new')S.tasks.push({id:uid(),status:'todo',createdBy:cur.id,...o});
  else Object.assign(S.tasks.find(x=>x.id===id),o);
  save();closeModal();render();toast('Tugas disimpan');
}
function delTask(id){S.tasks=S.tasks.filter(x=>x.id!==id);save();closeModal();render();toast('Tugas dihapus')}

    <div class="fg"><label>Caption</label><textarea id="cCap" placeholder="Teks caption">${esc(c.caption)}</textarea></div>
    <div class="fg"><label>Hashtag</label><input id="cHash" value="${esc(c.hashtags)}" placeholder="#karcher #kalingga"></div>

function saveContent(id){
  const plats=[...document.querySelectorAll('#cPlat .chk.on')].map(e=>e.dataset.p);

  const m=document.getElementById('mViews');
  if(m)o.metrics={views:+val('mViews')||0,likes:+val('mLikes')||0,reach:+val('mReach')||0,saves:+val('mSaves')||0};
  if(id==='new')S.content.push({id:uid(),owner:cur.role==='social'?cur.id:S.users.find(u=>u.role==='social').id,metrics:{views:0,likes:0,reach:0,saves:0},note:'',...o});
  else Object.assign(S.content.find(x=>x.id===id),o);
  save();closeModal();render();toast('Konten disimpan');
